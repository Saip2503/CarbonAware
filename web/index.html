<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CarbonAware - Track, understand, and reduce your carbon footprint. Log daily emissions, visualize trends, and get AI-driven insights.">
  <meta name="theme-color" content="#1B4332">

  <!-- Open Graph -->
  <meta property="og:title" content="CarbonAware">
  <meta property="og:description" content="Track, understand, and reduce your carbon footprint with CarbonAware.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CarbonAware">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CarbonAware — Track Your Carbon Footprint</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts Preloading for faster FCP -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Google Sign-In: required for google_sign_in_web -->
  <meta name="google-signin-client_id" content="1017440772168-n7jrfuqm8impqgcrvkg0mh9tqgib6dv8.apps.googleusercontent.com">

  <style>
    /* CSS Splash Screen for immediate First Contentful Paint */
    body {
      background-color: #1B4332;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .loader {
      border: 6px solid rgba(255, 255, 255, 0.3);
      border-top: 6px solid #4CAF50;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
